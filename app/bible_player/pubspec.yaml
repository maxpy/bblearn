name: bible_audio_player
description: A Flutter web app for listening to Bible audio with synchronized verse highlighting.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  google_fonts: ^6.1.0
  just_audio: ^0.9.36
  http: ^1.1.0
  equatable: ^2.0.5
  collection: ^1.18.0
  shared_preferences: ^2.2.2
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/text/
    - assets/audio/
